<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>BabyBloom — Signing in…</title>
  <meta name="robots" content="noindex" />
</head>
<body>
  <script>
    // GitHub Pages serves this static file at /babybloom/oauth/
    // Google redirects here after OAuth with ?code=...&state=...
    //
    // Stash the full callback URL and bounce back to the main app.
    // Some iOS/PWA flows lose sessionStorage during auth redirects, so we
    // also write localStorage and a hash fallback.
    try {
      sessionStorage.setItem('bb_oauth_callback', window.location.href);
    } catch (e) {}
    try {
      localStorage.setItem('bb_oauth_callback', window.location.href);
    } catch (e) {}
    const hashCallback = '#bb_oauth_callback=' + encodeURIComponent(window.location.href);
    window.location.replace('/babybloom/' + hashCallback);
  </script>
</body>
</html>
