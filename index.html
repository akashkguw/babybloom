// ═══ CHART HELPERS ═══
function daysAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function weekLabel(dateStr){var d=new Date(dateStr+'T00:00:00');return(d.getMonth()+1)+'/'+d.getDate()}
function monthLabel(dateStr){return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(dateStr.slice(5,7))-1]}
function getWeekStart(dateStr){var d=new Date(dateStr+'T00:00:00');var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);var m=new Date(d.getFullYear(),d.getMonth(),diff);return m.getFullYear()+"-"+String(m.getMonth()+1).padStart(2,"0")+"-"+String(m.getDate()).padStart(2,"0")}

function aggregateLogs(entries,period){
  var buckets={},labels={},order=[];
  if(period==='daily'){
    for(var i=6;i>=0;i--){var dk=daysAgo(i);buckets[dk]=0;labels[dk]=weekLabel(dk);order.push(dk)}
  }else if(period==='weekly'){
    for(var i=3;i>=0;i--){var dk=getWeekStart(daysAgo(i*7));if(!buckets[dk]){buckets[dk]=0;labels[dk]='W'+(4-i);order.push(dk)}}
  }else{
    for(var i=5;i>=0;i--){var d=new Date();d.setMonth(d.getMonth()-i);var mk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");buckets[mk]=0;labels[mk]=monthLabel(mk);order.push(mk)}
  }
  (entries||[]).forEach(function(e){
    if(!e.date)return;
    var k=period==='daily'?e.date:period==='weekly'?getWeekStart(e.date):e.date.slice(0,7);
    if(buckets[k]!==undefined)buckets[k]++
  });
  return order.map(function(k){return{label:labels[k],value:buckets[k],key:k}})
}

function aggregateValues(entries,field,period){
  var buckets={},labels={},order=[];
  if(period==='daily'){
    for(var i=6;i>=0;i--){var dk=daysAgo(i);buckets[dk]=[];labels[dk]=weekLabel(dk);order.push(dk)}
  }else if(period==='weekly'){
    for(var i=3;i>=0;i--){var dk=getWeekStart(daysAgo(i*7));if(!buckets[dk]){buckets[dk]=[];labels[dk]='W'+(4-i);order.push(dk)}}
  }else{
    for(var i=5;i>=0;i--){var d=new Date();d.setMonth(d.getMonth()-i);var mk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");buckets[mk]=[];labels[mk]=monthLabel(mk);order.push(mk)}
  }
  (entries||[]).forEach(function(e){
    if(!e.date||!e[field])return;var v=parseFloat(e[field]);if(isNaN(v))return;
    var k=period==='daily'?e.date:period==='weekly'?getWeekStart(e.date):e.date.slice(0,7);
    if(buckets[k]!==undefined)buckets[k].push(v)
  });
  return order.map(function(k){var arr=buckets[k];var avg=arr.length?Math.round(arr.reduce(function(s,v){return s+v},0)/arr.length*10)/10:0;return{label:labels[k],value:avg,key:k}})
}

function aggregateSum(entries,field,period,divisor){
  var buckets={},labels={},order=[];
  if(period==='daily'){
    for(var i=6;i>=0;i--){var dk=daysAgo(i);buckets[dk]=0;labels[dk]=weekLabel(dk);order.push(dk)}
  }else if(period==='weekly'){
    for(var i=3;i>=0;i--){var dk=getWeekStart(daysAgo(i*7));if(!buckets[dk]){buckets[dk]=0;labels[dk]='W'+(4-i);order.push(dk)}}
  }else{
    for(var i=5;i>=0;i--){var d=new Date();d.setMonth(d.getMonth()-i);var mk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");buckets[mk]=0;labels[mk]=monthLabel(mk);order.push(mk)}
  }
  var div=divisor||1;
  (entries||[]).forEach(function(e){
    if(!e.date)return;var v=parseFloat(e[field]);if(isNaN(v))return;
    var k=period==='daily'?e.date:period==='weekly'?getWeekStart(e.date):e.date.slice(0,7);
    if(buckets[k]!==undefined)buckets[k]+=v/div
  });
  return order.map(function(k){return{label:labels[k],value:Math.round(buckets[k]*10)/10,key:k}})
}

function BarChart({data,color,height}){

  var chartH=height||140;var w=300;var pad=10;var gap=4;

  return h("svg",{width:"100%",height:chartH+32,viewBox:"0 0 "+w+" "+(chartH+32),style:{display:"block"}},
    h("line",{x1:pad,y1:chartH,x2:w-pad,y2:chartH,stroke:C.b,strokeWidth:1}),
    data.map(function(d,i){
      var barH=maxVal>0?(d.value/maxVal)*chartH*0.85:0;
      var x=pad+i*(barW+gap)+gap/2;
      return h("g",{key:i},
        h("rect",{x:x,y:chartH-barH,width:barW,height:Math.max(barH,2),rx:4,fill:d.value>0?(color||C.p):C.b,opacity:d.value>0?1:0.3}),
        d.value>0?h("text",{x:x+barW/2,y:chartH-barH-5,textAnchor:"middle",fontSize:10,fill:C.t,fontWeight:700},d.value):null,

  return h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}},

  function ChartCard(cat,emoji,title,metrics){

    var totalLabel=met.unit?Math.round(total*10)/10+" "+met.unit:total;

        metrics.map(function(m){return h("div",{key:m.id},MetPill(cat,m.id,m.label))})):null,
      h(BarChart,{data:data,color:met.color||logColors[cat]||C.s}),

  // Determine available feed metrics

  if((logs.feed||[]).some(function(e){return e.mins&&!e.oz}))feedMetrics.push({id:"breast_min",label:"Breast Min",unit:"min",getData:function(e,p){return aggregateSum(e.filter(function(x){return x.mins&&!x.oz}),"mins",p,1)},color:C.a});
  if((logs.feed||[]).some(function(e){return e.oz}))feedMetrics.push({id:"bottle_oz",label:"Bottle Oz",unit:"oz",getData:function(e,p){return aggregateSum(e.filter(function(x){return x.oz}),"oz",p,1)},color:C.bl});

  var sleepMetrics=[{id:"count",label:"Count",getData:function(e,p){return aggregateLogs(e,p)},color:C.pu}];
  if((logs.sleep||[]).some(function(e){return e.mins}))sleepMetrics.push({id:"hours",label:"Total Hrs",unit:"hrs",getData:function(e,p){return aggregateSum(e,"mins",p,60)},color:C.pu});

  // Set defaults to the most useful metric
  if(!statMet.feed&&feedMetrics.length>1)setMet("feed",feedMetrics.length>2?"bottle_oz":"breast_min");
  if(!statMet.sleep&&sleepMetrics.length>1)setMet("sleep","hours");

  return h(F,null,
    h("div",{style:{display:"flex",gap:6,marginBottom:16}},
      ["daily","weekly","monthly"].map(function(p){return h(Pill,{key:p,label:p.charAt(0).toUpperCase()+p.slice(1),active:period===p,onClick:function(){setPeriod(p)},color:C.s})})),

    // Feed
    ChartCard("feed","🍼","Feeding",feedMetrics),
    // Sleep
    ChartCard("sleep","😴","Sleep",sleepMetrics),
    // Diaper
    ChartCard("diaper","💧","Diapers",[
      {id:"count",label:"Count",getData:function(e,p){return aggregateLogs(e,p)},color:C.bl},
      {id:"wet",label:"Wet Only",getData:function(e,p){return aggregateLogs(e.filter(function(x){return x.type==="Wet"||x.type==="Both"}),p)},color:C.bl},
      {id:"dirty",label:"Dirty Only",getData:function(e,p){return aggregateLogs(e.filter(function(x){return x.type==="Dirty"||x.type==="Both"}),p)},color:C.w}
    ]),
    // Pump
